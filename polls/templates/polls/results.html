{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Results</title>
    <link rel="stylesheet" href="{% static 'polls/style.css' %}?v=2">
</head>
<body>
    <div class="page">
        <main class="container">
            <div class="panel">
                <h1>{{ question.question_text }}</h1>
                <p class="subtitle">Current voting results</p>

                <ul class="results-list">
                    {% for choice in question.choice_set.all %}
                        <li class="result-item">
                            <span>{{ choice.choice_text }}</span>
                            <strong>{{ choice.votes }} vote{{ choice.votes|pluralize }}</strong>
                        </li>
                    {% endfor %}
                </ul>

                <div class="actions">
                    <a href="{% url 'polls:detail' question.id %}" class="btn">Vote again</a>
                    <a href="{% url 'polls:index' %}" class="btn btn-secondary">All polls</a>
                </div>
            </div>
        </main>
    </div>
</body>
</html>
