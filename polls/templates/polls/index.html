{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Polls</title>
    <link rel="stylesheet" href="{% static 'polls/style.css' %}?v=2">
</head>
<body>
    <div class="page">
        <header class="hero">
            <h1>Polls Application</h1>
            <p>Choose a question and vote.</p>
        </header>

        <main class="container">
            {% if latest_question_list %}
                <div class="cards">
                    {% for question in latest_question_list %}
                        <a class="card" href="{% url 'polls:detail' question.id %}">
                            <h2>{{ question.question_text }}</h2>
                            <span class="card-link">Open poll →</span>
                        </a>
                    {% endfor %}
                </div>
            {% else %}
                <div class="empty-state">
                    <p>No polls are available.</p>
                </div>
            {% endif %}
        </main>
    </div>
</body>
</html>
