{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{ question.question_text }}</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="{% static 'polls/style.css' %}">
</head>
<body class="app-bg">

<div class="container py-5">
    <div class="row justify-content-center">
        <div class="col-lg-8">
            <div class="card shadow border-0 rounded-4 p-4">
                <div class="card-body">
                    <h1 class="fw-bold mb-4">{{ question.question_text }}</h1>

                    {% if error_message %}
                        <div class="alert alert-danger rounded-3">
                            {{ error_message }}
                        </div>
                    {% endif %}

                    <form action="{% url 'polls:vote' question.id %}" method="post">
                        {% csrf_token %}

                        <div class="d-flex flex-column gap-3 mb-4">
                            {% for choice in question.choice_set.all %}
                                <label class="choice-box">
                                    <input type="radio" name="choice" value="{{ choice.id }}" class="form-check-input me-2">
                                    <span>{{ choice.choice_text }}</span>
                                </label>
                            {% endfor %}
                        </div>

                        <div class="d-flex flex-wrap gap-3">
                            <button type="submit" class="btn btn-primary animated-btn px-4">
                                Vote
                            </button>
                            <a href="{% url 'polls:index' %}" class="btn btn-outline-secondary px-4">
                                Back
                            </a>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>

</body>
</html>
