{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{ question.question_text }}</title>
    <link rel="stylesheet" href="{% static 'polls/style.css' %}?v=2">
</head>
<body>
    <div class="page">
        <main class="container">
            <div class="panel">
                <h1>{{ question.question_text }}</h1>

                {% if error_message %}
                    <p class="error-message">{{ error_message }}</p>
                {% endif %}

                <form action="{% url 'polls:vote' question.id %}" method="post" class="vote-form">
                    {% csrf_token %}

                    <div class="choices">
                        {% for choice in question.choice_set.all %}
                            <label class="choice-item" for="choice{{ forloop.counter }}">
                                <input
                                    type="radio"
                                    name="choice"
                                    id="choice{{ forloop.counter }}"
                                    value="{{ choice.id }}"
                                >
                                <span>{{ choice.choice_text }}</span>
                            </label>
                        {% endfor %}
                    </div>

                    <div class="actions">
                        <button type="submit" class="btn">Vote</button>
                        <a href="{% url 'polls:index' %}" class="btn btn-secondary">Back</a>
                    </div>
                </form>
            </div>
        </main>
    </div>
</body>
</html>
